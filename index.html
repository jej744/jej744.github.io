<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <meta name="description" content="A static blog hosted on GitHub Pages">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">My Blog</a>
            <div class="header-controls">
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <input type="text" id="search-input" class="search-input" placeholder="Search posts...">
            <div id="tags-container" class="tags-container"></div>
        </section>

        <section id="posts-container" class="posts-container">
            <!-- Posts will be injected here -->
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="current-year"></span> My Blog. Built with GitHub Pages.</p>
        </div>
    </footer>

    <script src="js/theme.js"></script>
    <script src="js/app.js" type="module"></script>
    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>

    <!-- ===== 포트폴리오 AI 챗봇 ===== -->
    <script>
        window.ChatWidgetConfig = {
            webhook: {
                url: 'https://dmswjd2460.app.n8n.cloud/webhook/chat'
            },
            branding: {
                name: 'jej744 AI Assistant',
                welcomeText: '안녕하세요! 제 블로그 AI 어시스턴트입니다. 블로그 글이나 저에 대해 궁금한 점을 물어보세요! 😊',
                responseTimeText: '잠시 후 답변드릴게요'
            },
            style: {
                primaryColor: '#5c6bc0',
                position: 'right',
                backgroundColor: '#1e293b',
                fontColor: '#ffffff'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/gh/juansebsol/n8n-chatbot-template@latest/chat-widget.js"></script>
</body>
</html>
